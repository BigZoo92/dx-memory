server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"status":"ok","service":"friction-web"}';
  }

  location ~* ^/assets/.+\.(?:js|css|woff2?|png|jpe?g|gif|svg|webp|avif|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
