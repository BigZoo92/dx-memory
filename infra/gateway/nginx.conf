pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp_path;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location = /health {
      access_log off;
      default_type application/json;
      add_header Cache-Control "no-store";
      return 200 '{"status":"ok","service":"dx-lab-gateway"}';
    }

    location = /release.json {
      add_header Cache-Control "no-cache";
      try_files /release.json =404;
    }

    location = /healthz/flow {
      set $flow_backend flow-app:3000;
      proxy_pass http://$flow_backend/api/health;
    }

    location = /healthz/friction {
      set $friction_api_backend friction-api:3101;
      proxy_pass http://$friction_api_backend/api/health;
    }

    location = /healthz/overfit {
      set $overfit_api_backend overfit-api:3200;
      proxy_pass http://$overfit_api_backend/api/health;
    }

    location = /healthz/metrics {
      access_log off;
      add_header Cache-Control "no-store";
      try_files /metrics/index.html =503;
    }

    location ^~ /api/flow/ {
      set $flow_backend flow-app:3000;
      rewrite ^/api/flow/(.*)$ /api/$1 break;
      proxy_buffering off;
      proxy_pass http://$flow_backend;
    }

    location ^~ /api/friction/ {
      set $friction_api_backend friction-api:3101;
      rewrite ^/api/friction/(.*)$ /api/$1 break;
      proxy_buffering off;
      proxy_pass http://$friction_api_backend;
    }

    location ^~ /api/overfit/ {
      set $overfit_api_backend overfit-api:3200;
      rewrite ^/api/overfit/(.*)$ /api/$1 break;
      proxy_buffering off;
      proxy_pass http://$overfit_api_backend;
    }

    location = /flow {
      return 308 /flow/;
    }

    location ^~ /flow/assets/ {
      alias /usr/share/nginx/html/flow/assets/;
      access_log off;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /flow/ {
      set $flow_backend flow-app:3000;
      proxy_pass http://$flow_backend;
    }

    location = /friction {
      return 308 /friction/;
    }

    location ^~ /friction/ {
      set $friction_web_backend friction-web:8080;
      rewrite ^/friction/(.*)$ /$1 break;
      proxy_pass http://$friction_web_backend;
    }

    location = /overfit {
      return 308 /overfit/;
    }

    location ^~ /overfit/ {
      set $overfit_web_backend overfit-web:3300;
      proxy_pass http://$overfit_web_backend;
    }

    location = /metrics {
      return 308 /metrics/;
    }

    location ^~ /metrics/assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    location ^~ /metrics/ {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /metrics/index.html;
    }

    location ^~ /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    location = /index.html {
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
