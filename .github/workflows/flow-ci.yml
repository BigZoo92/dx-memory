name: flow-ci

# Variant B - Flow. The "good DX" variant: fast, fine-grained, isolated, and never
# green-by-accident.
#
# ISOLATION (see scripts/flow/ci-scope-guard.mjs): every task is scoped to
# `tag:scope:flow` + `tag:scope:shared` via Nx tags, so Flow CI validates ONLY Flow's
# own projects and the shared socle packages Flow actually depends on. It never runs a
# friction-* / overfit-* / lab / metrics project. The scope guard fails the build if one
# ever leaks in.
#  - PRs run `nx affected` (base->head) intersected with the Flow scope.
#  - main runs `nx run-many` over the whole Flow scope + the Docker build.
#
# PARITY: format -> lint -> typecheck -> test -> build (+ Flow-specific boundary/cycle/dead-code
# gates + Docker on main). Same five quality-gate categories as Friction and Overfit.
#
# CACHE (deliberately simple - this is Flow's thesis): two layers only.
#  1. pnpm store         - via actions/setup-node `cache: pnpm` (keyed on pnpm-lock.yaml).
#  2. Nx local cache     - .nx/cache restored across runs (keyed on lockfile + sha, with
#                          restore-keys for warm partial hits). Nx invalidates per task by
#                          input hash, so a stale entry is never replayed.
# We deliberately stop here. No Docker layer cache, no remote cache, no warm-up jobs: the
# docker build only runs on main (low frequency) and the extra machinery would cost more DX
# than it returns. Knowing where to STOP optimizing is the point of the Flow variant.
# No `continue-on-error` on any quality gate.

on:
  push:
    branches: [main]
    paths:
      - 'apps/flow-app/**'
      - 'packages/**'
      - 'docker/flow/**'
      - '.github/workflows/flow-ci.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flow-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NX_DAEMON: 'false'

jobs:
  # ---- Pull requests: only what the diff affects, bounded to the Flow scope ---------------
  affected:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Nx can diff base->head

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm # cache layer 1: the pnpm store

      # cache layer 2: Nx local task cache, reused across CI runs.
      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: pnpm fixtures:generate

      - name: Derive Nx base/head
        uses: nrwl/nx-set-shas@v4

      - name: Scope guard (no foreign-variant project in Flow CI)
        run: pnpm flow:scope:guard

      - name: Format (oxfmt, Flow scope)
        run: pnpm format:check:flow

      # `nx affected` does NOT accept --projects (Nx 20.8.4 silently ignores it and runs ALL
      # affected projects, incl. other variants). The documented tag filter for affected is
      # --exclude='*,!tag:...' → keeps affected ∩ (scope:flow ∪ scope:shared). Verified: an
      # overfit-only diff selects zero projects; a flow-domain diff selects only its Flow subset.
      - name: Nx affected (Flow scope) - lint, typecheck, test, build
        run: pnpm exec nx affected -t lint typecheck test build --exclude='*,!tag:scope:flow,!tag:scope:shared' --base=$NX_BASE --head=$NX_HEAD

      - name: Architecture boundaries (dependency-cruiser)
        run: pnpm audit:flow:boundaries

      - name: Circular dependencies (madge)
        run: pnpm audit:flow:cycles

      - name: Dead code / unused deps (knip)
        run: pnpm audit:flow:knip

      - name: AI governance check
        run: pnpm flow:ai-pr-check

  # ---- main: full Flow-scope verification + Docker ----------------------------------------
  main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: pnpm fixtures:generate

      - name: Scope guard (no foreign-variant project in Flow CI)
        run: pnpm flow:scope:guard

      - name: Format (oxfmt, Flow scope)
        run: pnpm format:check:flow

      - name: Nx run-many (Flow scope) - lint, typecheck, test, build
        run: pnpm exec nx run-many -t lint typecheck test build --projects=tag:scope:flow,tag:scope:shared

      - name: Architecture boundaries (dependency-cruiser)
        run: pnpm audit:flow:boundaries

      - name: Circular dependencies (madge)
        run: pnpm audit:flow:cycles

      - name: Dead code / unused deps (knip)
        run: pnpm audit:flow:knip

      - name: Docker build (multi-stage)
        run: pnpm exec nx run flow-app:docker-build

  # ---- Accessibility: separate job so Chromium never slows the gate loop ------------------
  a11y:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true # advisory only; NOT a quality gate (see mission: probe vs gate)
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install accessibility tooling (dev/CI-only, Chromium)
        run: pnpm add -Dw --no-frozen-lockfile pa11y-ci @lhci/cli

      - name: Generate fixtures
        run: pnpm fixtures:generate

      - name: Accessibility audit (Pa11y + Lighthouse)
        run: pnpm flow:a11y

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-a11y-report
          path: |
            .pa11yci.runtime.json
            .lighthouseci/**
          if-no-files-found: ignore
