name: flow-ci

# Variant B — Flow. SKELETON: the build/test/ship steps are added in the Variant B pass.
# The job below validates the shared foundation the variant depends on.

on:
  push:
    branches: [main]
    paths:
      - 'apps/flow-app/**'
      - 'packages/**'
      - 'docker/flow/**'
      - '.github/workflows/flow-ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: pnpm fixtures:generate

      # TODO(variant-b): nx affected -t typecheck lint test for flow-app
      # TODO(variant-b): build flow-app and measure build time
      # TODO(variant-b): docker build (multi-stage) and measure docker build time
      # TODO(variant-b): run the @signalops/test-scenarios suite for this variant
      # TODO(variant-b): collect per-variant metrics and upload as artifact
      - name: Placeholder
        run: pnpm ci:flow
