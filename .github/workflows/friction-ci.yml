name: friction-ci

# Variant A - Friction. One job, runs the full gate every time.
#
# ISOLATION: Friction is standalone - its Nx dependency closure is empty (it ships a local
# copy of the dataset and shares no @signalops socle package). Every step targets the two
# Friction projects by exact package name via `pnpm --filter @signalops/friction-{api,web}`,
# which cannot match a flow-* / overfit-* / lab / metrics project. No cross-variant leakage
# is structurally possible.
#
# PARITY: format -> lint -> typecheck -> test -> build (+ Docker). Same five quality-gate
# categories as Flow and Overfit. Deliberately no `nx affected`, no targeting, no Nx cache,
# no a11y/Lighthouse: Friction's identity in the lab is "no build optimization", so its only
# cache is the pnpm store. This is intentional, not an oversight.

on:
  push:
    branches: [main]
    paths:
      - 'apps/friction-web/**'
      - 'apps/friction-api/**'
      - 'packages/**'
      - 'docker/friction/**'
      - '.github/workflows/friction-ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  friction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm # the only cache layer Friction gets: the pnpm store

      - name: Install (whole workspace)
        run: pnpm install --frozen-lockfile

      - name: Format (Prettier)
        run: |
          pnpm --filter @signalops/friction-api format:check
          pnpm --filter @signalops/friction-web format:check

      - name: Lint (ESLint)
        run: |
          pnpm --filter @signalops/friction-api lint
          pnpm --filter @signalops/friction-web lint

      - name: Typecheck
        run: |
          pnpm --filter @signalops/friction-api typecheck
          pnpm --filter @signalops/friction-web typecheck

      - name: Test (backend)
        run: pnpm --filter @signalops/friction-api test

      - name: Test (frontend)
        run: pnpm --filter @signalops/friction-web test

      - name: Build (backend)
        run: pnpm --filter @signalops/friction-api build

      - name: Build (frontend)
        run: pnpm --filter @signalops/friction-web build

      - name: Docker build (api)
        run: docker build -f apps/friction-api/Dockerfile -t signalops-friction-api:ci .

      - name: Docker build (web)
        run: docker build -f apps/friction-web/Dockerfile -t signalops-friction-web:ci .
