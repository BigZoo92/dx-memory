name: friction-ci

# Variant A - Friction. One job, runs everything every time: no affected, no targeting,
# no caching beyond the pnpm store, no a11y / Lighthouse / dependency-graph checks.

on:
  push:
    branches: [main]
    paths:
      - 'apps/friction-web/**'
      - 'apps/friction-api/**'
      - 'packages/**'
      - 'docker/friction/**'
      - '.github/workflows/friction-ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  friction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (whole workspace)
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: |
          pnpm --filter @signalops/friction-api format:check
          pnpm --filter @signalops/friction-web format:check

      - name: ESLint
        run: |
          pnpm --filter @signalops/friction-api lint
          pnpm --filter @signalops/friction-web lint

      - name: Typecheck
        run: |
          pnpm --filter @signalops/friction-api typecheck
          pnpm --filter @signalops/friction-web typecheck

      - name: Test (backend)
        run: pnpm --filter @signalops/friction-api test

      - name: Test (frontend)
        run: pnpm --filter @signalops/friction-web test

      - name: Build (backend)
        run: pnpm --filter @signalops/friction-api build

      - name: Build (frontend)
        run: pnpm --filter @signalops/friction-web build

      - name: Docker build (api)
        run: docker build -f apps/friction-api/Dockerfile -t signalops-friction-api:ci .

      - name: Docker build (web)
        run: docker build -f apps/friction-web/Dockerfile -t signalops-friction-web:ci .
